version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_HOSTNAME=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=Fastapi
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=Ashumylove
      - SECRET_KEY=09d25e094faa6ca2556c818166b7a9563b93f3a804e653a4010e1e444aa
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db
    volumes:
      - ./:/usr/src/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Ashumylove
      - POSTGRES_DB=Fastapi
    ports:
      - "5432:5432"
